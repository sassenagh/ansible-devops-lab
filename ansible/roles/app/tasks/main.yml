- name: Create app directory
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOST_APP_PATH') }}"
    state: directory
    mode: "0755"

- name: Render HTML from template
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ lookup('env', 'HOST_APP_PATH') }}/index.html"
    mode: "0644"
